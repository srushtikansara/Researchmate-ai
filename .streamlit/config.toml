[theme]
base = "dark"
primaryColor = "#4F6AF5"
backgroundColor = "#0E0E1A"
secondaryBackgroundColor = "#1E1E2E"
textColor = "#E0E0E0"
font = "sans serif"

[server]
maxUploadSize = 200
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
[server]
fileWatcherType = "none"